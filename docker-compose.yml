services:
  mysql:
    image: mysql:8.0
    container_name: leave_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: leave_db
      MYSQL_USER: leave_user
      MYSQL_PASSWORD: leave_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
