events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name _;

        # Serve the built React app
        root /usr/share/nginx/html;
        index index.html;

        # Security headers — applied to every response from this server.
        # Clickjacking protection: don't allow this site to be framed.
        add_header X-Frame-Options "DENY" always;
        # Stop the browser from MIME-sniffing responses away from the
        # declared Content-Type (e.g. treating a JSON reply as executable).
        add_header X-Content-Type-Options "nosniff" always;
        # Don't leak the full referring URL (which may contain tokens or
        # IDs in the path/query) to other origins.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Baseline CSP: same-origin by default, inline styles allowed since
        # the built React app ships some inline styles from its CSS tooling,
        # and connections restricted to same-origin (all API calls go
        # through this same nginx host via /api/).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
        # Lock down powerful browser features this app doesn't use.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # React Router: any unknown path falls back to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy API calls to the backend container,
        # stripping the /api prefix before forwarding.
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Nginx is the only public entry point in this deployment (see
            # architecture diagram in README) — there is no upstream trusted
            # proxy in front of it. $proxy_add_x_forwarded_for APPENDS to
            # whatever X-Forwarded-For the client already sent, which means
            # a client can prepend a fake IP and the backend's
            # "take the left-most value" logic would trust the attacker-
            # supplied value instead of the real one. Using $remote_addr
            # here discards any client-supplied X-Forwarded-For entirely and
            # forwards only the IP nginx itself observed, which cannot be
            # spoofed by the request. If a real upstream proxy/load balancer
            # is ever added in front of nginx, this must be revisited.
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
